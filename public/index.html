<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Zamarin | AI Chief of Staff OS - Built for Wrapbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F9FAFB; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
    input:focus { border-color: #6733FF !important; box-shadow: 0 0 0 3px rgba(103,51,255,0.1) !important; }
    button:hover { filter: brightness(1.05); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PURPLE = '#6733FF';
    const PURPLE_LIGHT = '#8B5CF6';
    const PURPLE_BG = 'rgba(103, 51, 255, 0.08)';

    const MOCK_OKRS = [
      { obj: 'Scale payroll processing 3x with AI-powered AP automation', progress: 72, status: 'on-track', owner: 'Engineering', lead: 'Naysawn Naji', role: 'Co-Founder & CIO', email: 'naysawn@wrapbook.com', context: 'Aligned with Oct 2025 AP automation launch - AI invoice processing already reducing manual entry for early adopters like Paramount and Unrealistic Ideas.' },
      { obj: 'Launch Rate Finder V2 with predictive labor cost modeling', progress: 45, status: 'at-risk', owner: 'Product', lead: 'Product Lead', role: 'VP Product', email: 'product@wrapbook.com', context: 'Building on the Rate Finder tool launched Aug 2025 (covered by Deadline). V2 adds predictive modeling on top of union scale rate search. At risk due to SAG-AFTRA contract expiration Mar 31, 2026 - new rates needed before launch.' },
      { obj: 'Expand to 5 new union & guild agreements', progress: 88, status: 'on-track', owner: 'Compliance', lead: 'Compliance Lead', role: 'Head of Compliance', email: 'compliance@wrapbook.com', context: 'Strong momentum. 2025 SAG-AFTRA Commercials Contract already integrated. New Interactive Media Agreement (AI/digital replica provisions) in progress. DGA and Teamsters agreements on deck.' },
      { obj: 'Reduce crew onboarding time by 50% (4.2 → 2.1 days)', progress: 31, status: 'behind', owner: 'Operations', lead: 'Operations Lead', role: 'VP Operations', email: 'operations@wrapbook.com', context: 'Currently at 2.8 days (down from 4.2). Wrapbook 2026 report shows 80%+ of teams still rely on email and manual entry - largest remaining blocker is production company adoption of digital onboarding flows.' },
      { obj: 'Close 3 major studio enterprise deals ($500K+ ACV each)', progress: 63, status: 'on-track', owner: 'Sales', lead: 'Jeff Caruso', role: 'SVP, Studio Sales & Success', email: 'jeff@wrapbook.com', context: 'New SVP hire leading enterprise push. Pipeline at 2.3x target. Cinapse acquisition (Dec 2025) strengthening production accounting pitch. California tax incentive doubling driving studio interest.' },
    ];

    const MOCK_INITIATIVES = [
      { name: 'AI-Powered AP Command Center', status: 'In Progress', priority: 'P0', teams: ['Engineering', 'Product', 'AI'], dueDate: 'Q2 2026', sponsor: 'Ali Javid, CEO', desc: 'Extending the AI invoice processing and vendor verification launched Oct 2025. Goal: fully automated AP workflow from PO to payment. Early results from Paramount and Unrealistic Ideas show "noticeably simpler" invoice processing.', blockers: 'None - on track' },
      { name: 'SAG-AFTRA 2026 Contract Transition', status: 'Urgent', priority: 'P0', teams: ['Compliance', 'Engineering', 'Product'], dueDate: 'Apr 1, 2026', sponsor: 'Compliance Lead', desc: '2025 Commercials Contract expires March 31, 2026. New digital replica/AI reporting requirements (30-day synthetic performer disclosure, 1.5x session fees). Rate Finder needs updated rates. Interactive Media Agreement AI provisions must be integrated.', blockers: 'Waiting on final SAG-AFTRA rate tables for 2026 cycle' },
      { name: 'Cinapse Integration', status: 'In Progress', priority: 'P1', teams: ['Engineering', 'Product', 'Operations'], dueDate: 'Q2 2026', sponsor: 'Naysawn Naji, CIO', desc: 'Integrating Cinapse (acquired Dec 2025) into Wrapbook platform. Strengthens production accounting capabilities - key differentiator vs. Cast & Crew. Addresses the "disconnected systems" problem cited by 64% of finance leaders in our 2026 report.', blockers: 'Data migration timeline TBD' },
      { name: 'California Production Incentive Automation', status: 'Planning', priority: 'P1', teams: ['Product', 'Compliance', 'Sales'], dueDate: 'Q3 2026', sponsor: 'Jeff Caruso, SVP Sales', desc: 'California doubled its annual tax incentive cap - studios announcing major productions (Heat 2, Jumanji). Opportunity to automate incentive compliance tracking as a first-mover. Sales team needs this for enterprise deal acceleration.', blockers: 'Scope definition in progress' },
      { name: 'Production Finance Dashboard V2', status: 'Scoping', priority: 'P2', teams: ['Product', 'Design', 'Data'], dueDate: 'Q4 2026', sponsor: 'Cameron Woodward, CMO', desc: 'CEO Ali Javid: "What this research highlights is a systems problem, not a people problem." V2 addresses the 64% who cite disconnected systems as #1 barrier to cash flow prediction. Unified real-time view across payroll, AP, and accounting.', blockers: 'Dependent on Cinapse integration completion' },
    ];

    const BRIEFING_SECTIONS = [
      {
        title: 'Critical Items Requiring Attention', icon: '🔴', borderColor: '#FCA5A5',
        items: [
          '**SAG-AFTRA 2026 Contract Transition (Deadline: April 1)**: The 2025 Commercials Contract expires March 31, 2026. New digital replica and AI reporting provisions require system updates - producers must disclose synthetic performer use within 30 days of air date and pay 1.5x session fees. Engineering needs to prioritize Rate Finder updates with new rate tables. Recommend Ali sync with VP Eng today to confirm sprint allocation.',
          '**Industry headwinds - production volume at pandemic lows**: Q3 2025 production volume was the lowest since COVID. US Movie & Video Production revenue estimated to fall 8.2% CAGR to $42B through 2026. Our 2026 State of Production Finance report confirms nearly 90% of clients cite tightening budgets as their #1 concern. Finance should model conservative payroll volume scenarios for Q3.',
        ],
      },
      {
        title: 'Cross-Functional Updates', icon: '🔄', borderColor: PURPLE_LIGHT,
        items: [
          '**Product + Engineering (Naysawn Naji, CIO)**: AI AP Command Center showing strong early results - Ciria Cordero at Unrealistic Ideas reports "invoice processing is noticeably simpler," Raymond Arturo Perez at Paramount calls it "fabulous." Cinapse integration (acquired Dec 2025) on track for Q2 - addresses the 64% of finance leaders who cite disconnected systems as #1 barrier to cash flow prediction.',
          '**Sales (Jeff Caruso, SVP Studio Sales)**: Pipeline at 2.3x target. California doubling its annual tax incentive cap is driving major studio interest - Heat 2 and Jumanji confirmed to shoot in-state. Three enterprise deals ($500K+ ACV) in final stages. Jeff needs expedited legal review on custom SLA terms.',
          '**Marketing (Cameron Woodward, CMO)**: 2026 State of Production Finance report just published - strong PR coverage, 100 respondent base. Recommend leveraging Ali\'s quote ("this is a systems problem, not a people problem") as LinkedIn thought leadership content this week. Also: competitor Cast & Crew experiencing recurring outage issues - arm AEs with competitive talking points.',
        ],
      },
      {
        title: 'Opportunities to Highlight', icon: '🟢', borderColor: '#6EE7B7',
        items: [
          '**California incentive automation**: The doubled tax incentive cap is attracting major productions back to CA (state spend was $1.5B last year). First-mover opportunity to automate incentive compliance tracking - no competitor offers this. Product should scope with Jeff\'s team this week.',
          '**AI/Digital replica compliance as differentiator**: SAG-AFTRA\'s new Interactive Media Agreement requires "clear and conspicuous" disclosure for digital replicas plus employer usage reports within 90 days. Studios need tooling for this - Wrapbook can be the platform of record. Aligns with the industry trend: generative AI is transforming production workflows, but compliance is the bottleneck.',
          '**Creator economy expansion**: Boundaries between Hollywood and the creator economy are dissolving (per industry reports). Studios embracing creators as talent opens a new segment of smaller, higher-frequency productions - ideal for Wrapbook\'s transactional pricing model.',
        ],
      },
      {
        title: "This Week's Leadership Priorities", icon: '📋', borderColor: '#E5E7EB',
        items: [
          'Monday: Finalize Q3 OKRs - incorporate conservative volume scenarios given industry production slowdown. Key narrative: win share in a contracting market through AI differentiation.',
          'Wednesday: Board prep - lead with 2026 report data (90% budget pressure stat), Cinapse integration progress, and enterprise pipeline strength. Frame AI AP automation as the moat.',
          'Friday: All-hands - Ali should spotlight customer testimonials from Paramount and Unrealistic Ideas. Morale matters when industry is in a downturn - show the team we\'re winning despite headwinds.',
        ],
      },
    ];

    const CHAT_RESPONSES = {
      compliance: `Based on cross-functional data and recent industry developments, here are the top compliance risks:\n\n**1. SAG-AFTRA 2026 Contract Transition (CRITICAL)**\nThe 2025 Commercials Contract expires March 31, 2026 - 15 days away. Key changes:\n• Digital replica: producers must disclose synthetic performer use within 30 days of air date\n• AI compensation: 1.5x session fees when Synthetic Performers are used alongside human performers\n• Interactive Media: "clear and conspicuous" written consent required for digital replicas, plus employer usage reports within 90 days of release\n• Rate Finder needs updated 2026 rate tables before April 1\n\n**Owner:** Compliance Lead + Naysawn Naji (CIO)\n**Recommendation:** Escalate to Ali Javid for CEO-VP Eng sync today. Rate Finder update must be in next sprint.\n\n**2. California AB-5 Worker Reclassification (MEDIUM)**\nThree enterprise pipeline clients flagged for potential misclassification. With CA doubling tax incentives and major productions (Heat 2, Jumanji) returning to the state, AB-5 scrutiny will increase.\n\n**Owner:** Legal\n\n**3. Canadian Payroll Tax Updates (LOW)**\nNew BC and Ontario withholding requirements. Tax engine update shipping next week - on track.`,
      initiative: `Here's the status of our top 3 cross-functional initiatives:\n\n**🔴 SAG-AFTRA 2026 Contract Transition (P0)**\n• Deadline: April 1, 2026 (15 days)\n• Sponsor: Compliance Lead\n• Blocker: Waiting on final 2026 rate tables from SAG-AFTRA\n• Action needed: Engineering sprint allocation for Rate Finder update\n• Context: New AI/digital replica provisions create both compliance risk and product opportunity\n\n**🟢 AI-Powered AP Command Center (P0)**\n• Progress: On track for Q2 launch\n• Sponsor: Ali Javid, CEO\n• Results: Paramount ("fabulous"), Unrealistic Ideas ("noticeably simpler")\n• Next milestone: Expand from invoice processing to full PO-to-payment automation\n\n**🟡 Cinapse Integration (P1)**\n• Progress: In progress, Q2 target\n• Sponsor: Naysawn Naji, CIO\n• Acquired Dec 2025 - strengthens production accounting\n• Addresses #1 pain point: 64% of finance leaders cite disconnected systems as biggest barrier (per our 2026 report)\n• Blocker: Data migration timeline TBD`,
      budget: `Here's the current financial picture with industry context:\n\n**Macro Context: Industry Under Pressure**\n• US production volume at lowest since the pandemic (Q3 2025)\n• Industry revenue falling at 8.2% CAGR to $42B through 2026\n• Our 2026 report: nearly 90% of clients cite tightening budgets as #1 concern\n• Studios investing in lower-budget, higher-margin projects and franchise content\n\n**Wrapbook Revenue: $12.4M processed** (↑ 23% QoQ)\n• Growing despite industry contraction - taking market share\n• New enterprise deals (Jeff Caruso's pipeline at 2.3x target) driving volume\n• Transactional revenue trending $800K above target\n• Cinapse acquisition strengthening enterprise value prop\n\n**Cost Variance: +12% over forecast**\n• Infrastructure scaling for 3 new enterprise clients\n• Accelerated hiring in Customer Success (+2 FTEs)\n\n**Recommendation:**\nFrame for the board as "winning share in a contracting market." As Ali said in the 2026 report: "This is a systems problem, not a people problem." Our AI automation is the differentiator. Suggest reforecasting with conservative Q3 volume scenarios but bullish on enterprise ACV growth.`,
      industry: `Here's what's happening in the entertainment industry right now:\n\n**Production Volume & Spending**\n• Q3 2025 production volume was the lowest since the pandemic\n• US Movie & Video Production revenue: falling 8.2% CAGR to $42B\n• California production spend fell YoY to $1.5B - but the state doubled its tax incentive cap, attracting Heat 2 and Jumanji\n\n**AI Transformation**\n• Generative video breakthroughs transforming production workflows\n• SAG-AFTRA establishing new standards: digital replica consent, synthetic performer fees, usage reporting\n• Studios and creators navigating authenticity, labor, and environmental concerns\n\n**Content Strategy Shifts**\n• Studios recalibrating toward franchise + faith-forward content\n• Creator economy dissolving boundaries with traditional Hollywood\n• Streaming embracing hybrid subscription + advertising models\n\n**What This Means for Wrapbook**\n• Cost pressure drives demand for our automation (90% cite tightening budgets)\n• AI compliance is a greenfield opportunity - no competitor offers it\n• California incentive automation could be a first-mover play\n• Creator economy = more productions, smaller budgets = perfect for transactional pricing`,
      default: `I'm your AI Chief of Staff. I synthesize cross-functional data from across Wrapbook - compliance, finance, product, engineering, sales, and industry trends.\n\nHere are some things I can help with:\n• **"What are our compliance risks?"** - SAG-AFTRA, AB-5, union changes\n• **"Status of our initiatives"** - AP automation, Cinapse, Rate Finder\n• **"How's the budget looking?"** - Revenue, costs, board framing\n• **"What's happening in the industry?"** - Production trends, AI regulation, studio spending\n• **"Who owns this?"** - Accountable leads and contact info for any initiative\n\nI pull from Wrapbook's 2026 State of Production Finance report, recent product launches, SAG-AFTRA contract updates, and industry data.\n\nWhat would you like to know?`,
    };

    function getResponse(input) {
      const lower = input.toLowerCase();
      if (lower.includes('compliance') || lower.includes('risk') || lower.includes('union') || lower.includes('sag') || lower.includes('replica')) return CHAT_RESPONSES.compliance;
      if (lower.includes('initiative') || lower.includes('status') || lower.includes('project') || lower.includes('top 3') || lower.includes('cinapse')) return CHAT_RESPONSES.initiative;
      if (lower.includes('budget') || lower.includes('cost') || lower.includes('revenue') || lower.includes('finance') || lower.includes('spend') || lower.includes('money')) return CHAT_RESPONSES.budget;
      if (lower.includes('industry') || lower.includes('trend') || lower.includes('market') || lower.includes('hollywood') || lower.includes('production volume') || lower.includes('studio')) return CHAT_RESPONSES.industry;
      return CHAT_RESPONSES.default;
    }

    function renderMarkdown(text) {
      return text.split('\n').map((line, i) => {
        const boldParsed = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        if (line.startsWith('• ') || line.startsWith('- ')) {
          return <div key={i} style={{ paddingLeft: 16, marginBottom: 2 }} dangerouslySetInnerHTML={{ __html: '• ' + boldParsed.slice(2) }} />;
        }
        if (line === '') return <br key={i} />;
        return <div key={i} style={{ marginBottom: 2 }} dangerouslySetInnerHTML={{ __html: boldParsed }} />;
      });
    }

    function StatusBadge({ status }) {
      const colors = {
        'on-track': { bg: '#ECFDF5', text: '#059669', label: 'On Track' },
        'at-risk': { bg: '#FFF7ED', text: '#EA580C', label: 'At Risk' },
        behind: { bg: '#FEF2F2', text: '#DC2626', label: 'Behind' },
      };
      const c = colors[status];
      return <span style={{ background: c.bg, color: c.text, padding: '2px 10px', borderRadius: 99, fontSize: 12, fontWeight: 600 }}>{c.label}</span>;
    }

    function PriorityBadge({ priority }) {
      const colors = { P0: '#DC2626', P1: '#EA580C', P2: '#6733FF' };
      return <span style={{ background: colors[priority] || '#888', color: '#fff', padding: '2px 8px', borderRadius: 4, fontSize: 11, fontWeight: 700 }}>{priority}</span>;
    }

    function ProgressBar({ value }) {
      const [width, setWidth] = useState(0);
      useEffect(() => { const t = setTimeout(() => setWidth(value), 100); return () => clearTimeout(t); }, [value]);
      return (
        <div style={{ background: '#E5E7EB', borderRadius: 99, height: 6, width: '100%', overflow: 'hidden' }}>
          <div style={{ background: value >= 70 ? '#059669' : value >= 40 ? '#EA580C' : '#DC2626', height: '100%', width: `${width}%`, borderRadius: 99, transition: 'width 1.2s cubic-bezier(0.4, 0, 0.2, 1)' }} />
        </div>
      );
    }

    function NavButton({ label, icon, active, onClick }) {
      const [hovered, setHovered] = useState(false);
      return (
        <button onClick={onClick} onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
          style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 16px', borderRadius: 8, border: 'none', cursor: 'pointer', width: '100%', textAlign: 'left', background: active ? PURPLE_BG : hovered ? '#F3F4F6' : 'transparent', color: active ? PURPLE : '#6B7280', fontWeight: active ? 600 : 400, fontSize: 14, transition: 'all 0.15s' }}>
          <span style={{ fontSize: 18 }}>{icon}</span>{label}
        </button>
      );
    }

    // ─── Briefing Tab ────────────────────────────────────
    function BriefingTab() {
      const [generated, setGenerated] = useState(false);
      const [revealing, setRevealing] = useState(-1);
      const [loading, setLoading] = useState(false);

      function generate() {
        setLoading(true);
        setTimeout(() => { setLoading(false); setGenerated(true); setRevealing(0); }, 1500);
      }

      useEffect(() => {
        if (revealing >= 0 && revealing < BRIEFING_SECTIONS.length) {
          const timer = setTimeout(() => setRevealing(revealing + 1), 600);
          return () => clearTimeout(timer);
        }
      }, [revealing]);

      return (
        <div>
          <div style={{ marginBottom: 24 }}>
            <h2 style={{ fontSize: 24, fontWeight: 700, color: '#111', margin: 0 }}>AI Morning Briefing</h2>
            <p style={{ color: '#6B7280', fontSize: 14, marginTop: 6 }}>One-click executive briefing synthesized from cross-functional data, OKRs, and initiative status.</p>
          </div>
          {!generated ? (
            <div style={{ textAlign: 'center', padding: '80px 20px' }}>
              <div style={{ fontSize: 56, marginBottom: 20 }}>🌅</div>
              <h3 style={{ fontSize: 20, fontWeight: 600, color: '#111', marginBottom: 8 }}>
                {loading ? 'Synthesizing cross-functional data...' : "Ready to generate today's briefing"}
              </h3>
              <p style={{ color: '#6B7280', fontSize: 14, marginBottom: 28, maxWidth: 440, margin: '0 auto 28px' }}>
                {loading ? 'Analyzing OKRs, initiative updates, compliance items, and financial data...' : 'AI synthesizes OKR progress, cross-functional updates, risks, and opportunities into an executive-ready briefing.'}
              </p>
              {!loading ? (
                <button onClick={generate} style={{ background: PURPLE, color: '#fff', border: 'none', padding: '14px 36px', borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: 'pointer', boxShadow: '0 4px 12px rgba(103,51,255,0.3)' }}>
                  Generate CEO Briefing →
                </button>
              ) : (
                <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, color: PURPLE, fontWeight: 600 }}>
                  <div style={{ width: 20, height: 20, border: `2px solid ${PURPLE}`, borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
                  Processing...
                </div>
              )}
            </div>
          ) : (
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 20, padding: '12px 16px', background: PURPLE_BG, borderRadius: 10 }}>
                <span style={{ color: PURPLE, fontWeight: 600, fontSize: 14 }}>📅 Briefing for {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                <span style={{ marginLeft: 'auto', color: '#9CA3AF', fontSize: 12 }}>Generated by AI Chief of Staff</span>
              </div>
              {BRIEFING_SECTIONS.map((section, si) => (
                <div key={si} style={{ marginBottom: 16, padding: 22, background: '#fff', borderRadius: 12, border: '1px solid #E5E7EB', opacity: si <= revealing ? 1 : 0, transform: si <= revealing ? 'translateY(0)' : 'translateY(12px)', transition: 'all 0.5s cubic-bezier(0.4, 0, 0.2, 1)' }}>
                  <h3 style={{ fontSize: 15, fontWeight: 700, color: '#111', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span>{section.icon}</span> {section.title}
                  </h3>
                  {section.items.map((item, ii) => (
                    <div key={ii} style={{ fontSize: 14, color: '#374151', lineHeight: 1.7, marginBottom: ii < section.items.length - 1 ? 12 : 0, paddingLeft: 14, borderLeft: `2px solid ${section.borderColor}` }}>
                      {renderMarkdown(item)}
                    </div>
                  ))}
                </div>
              ))}
              {revealing >= BRIEFING_SECTIONS.length && (
                <div style={{ textAlign: 'center', padding: '16px 0' }}>
                  <button onClick={() => { setGenerated(false); setRevealing(-1); }} style={{ background: 'transparent', color: PURPLE, border: `1px solid ${PURPLE}`, padding: '10px 24px', borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                    ↻ Regenerate Briefing
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ─── Chat Tab ────────────────────────────────────────
    function ChatTab() {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: "Good morning. I'm your AI Chief of Staff. I can help you with cross-functional updates, risk assessments, initiative tracking, budget analysis, and stakeholder alignment.\n\nTry asking me:\n• \"What are our biggest compliance risks?\"\n• \"Status of our top 3 initiatives\"\n• \"How's the Q2 budget looking?\"" },
      ]);
      const [input, setInput] = useState('');
      const [typing, setTyping] = useState(false);
      const bottomRef = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, typing]);

      function send() {
        if (!input.trim() || typing) return;
        const userMsg = input.trim();
        setInput('');
        setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
        setTyping(true);
        setTimeout(() => {
          setMessages(prev => [...prev, { role: 'assistant', content: getResponse(userMsg) }]);
          setTyping(false);
        }, 1200 + Math.random() * 800);
      }

      const suggestions = ['What are our biggest compliance risks?', 'Status of our top 3 initiatives', "How's the Q2 budget looking?", "What's happening in the industry?"];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: 'calc(100vh - 200px)', minHeight: 500 }}>
          <div style={{ marginBottom: 16 }}>
            <h2 style={{ fontSize: 24, fontWeight: 700, color: '#111', margin: 0 }}>Ask the Chief of Staff</h2>
            <p style={{ color: '#6B7280', fontSize: 14, marginTop: 6 }}>Natural language interface for executive decision support. Ask about any function, initiative, or risk.</p>
          </div>
          <div style={{ flex: 1, overflowY: 'auto', padding: '16px 0', display: 'flex', flexDirection: 'column', gap: 16 }}>
            {messages.map((msg, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start' }} className="animate-fade-in">
                <div style={{ maxWidth: '80%', padding: '14px 18px', borderRadius: 14, background: msg.role === 'user' ? PURPLE : '#fff', color: msg.role === 'user' ? '#fff' : '#111', fontSize: 14, lineHeight: 1.65, border: msg.role === 'assistant' ? '1px solid #E5E7EB' : 'none', boxShadow: msg.role === 'assistant' ? '0 1px 3px rgba(0,0,0,0.04)' : 'none' }}>
                  {msg.role === 'assistant' ? renderMarkdown(msg.content) : msg.content}
                </div>
              </div>
            ))}
            {typing && (
              <div style={{ display: 'flex', justifyContent: 'flex-start' }} className="animate-fade-in">
                <div style={{ padding: '14px 18px', borderRadius: 14, background: '#fff', border: '1px solid #E5E7EB', color: '#9CA3AF', fontSize: 14 }}>
                  Analyzing cross-functional data...
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>
          {messages.length === 1 && (
            <div style={{ display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' }}>
              {suggestions.map((s, i) => (
                <button key={i} onClick={() => setInput(s)} style={{ background: '#fff', border: '1px solid #E5E7EB', borderRadius: 8, padding: '8px 14px', fontSize: 13, color: '#374151', cursor: 'pointer' }}>
                  {s}
                </button>
              ))}
            </div>
          )}
          <div style={{ display: 'flex', gap: 8, paddingTop: 12, borderTop: '1px solid #E5E7EB' }}>
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Ask about compliance, initiatives, budget, risks..." style={{ flex: 1, padding: '14px 18px', borderRadius: 10, border: '1px solid #D1D5DB', fontSize: 14, outline: 'none' }} />
            <button onClick={send} disabled={typing || !input.trim()} style={{ background: PURPLE, color: '#fff', border: 'none', padding: '0 28px', borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: 'pointer', opacity: typing || !input.trim() ? 0.5 : 1 }}>
              Send
            </button>
          </div>
        </div>
      );
    }

    // ─── Chevron Arrow ────────────────────────────────────
    function Chevron({ open }) {
      return (

        if (sortBy === 'department') return (a.teams[0] || '').localeCompare(b.teams[0] || '');
